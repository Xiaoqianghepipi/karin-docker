name: Check Karin Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest Karin core release version from GitHub
        id: latest
        shell: bash
        run: |
          version=$(curl -s https://api.github.com/repos/KarinJS/Karin/releases | jq -r '.[] | select(.tag_name | startswith("core-v")) | .tag_name' | head -1 | sed 's/core-v//')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Read recorded Karin core version
        id: recorded
        shell: bash
        run: |
          if [ -f .github/karin-core-version.txt ]; then
            version="$(tr -d '[:space:]' < .github/karin-core-version.txt)"
          else
            version=""
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update recorded version file
        if: steps.latest.outputs.version != steps.recorded.outputs.version
        shell: bash
        run: |
          echo "${{ steps.latest.outputs.version }}" > .github/karin-core-version.txt

      - name: Commit and push changes
        if: steps.latest.outputs.version != steps.recorded.outputs.version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/karin-core-version.txt
          git commit -m "chore(ci): bump karin core to ${{ steps.latest.outputs.version }}"
          git push
